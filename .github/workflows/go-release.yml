name: go-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            name: controli-darwin-arm64
          - goos: darwin
            goarch: amd64
            name: controli-darwin-amd64
          - goos: linux
            goarch: amd64
            name: controli-linux-amd64
          - goos: linux
            goarch: arm64
            name: controli-linux-arm64
          - goos: windows
            goarch: amd64
            name: controli-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go test ./...
      - run: CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath -ldflags="-s -w" -o dist/${{ matrix.name }} ./cmd/controli
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}
