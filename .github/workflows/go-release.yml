name: go-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            name: controli-darwin-arm64
          - goos: darwin
            goarch: amd64
            name: controli-darwin-amd64
          - goos: linux
            goarch: "386"
            name: controli-linux-386
          - goos: linux
            goarch: amd64
            name: controli-linux-amd64
          - goos: linux
            goarch: arm
            goarm: "6"
            name: controli-linux-armv6
          - goos: linux
            goarch: arm
            goarm: "7"
            name: controli-linux-armv7
          - goos: linux
            goarch: arm64
            name: controli-linux-arm64
          - goos: linux
            goarch: ppc64le
            name: controli-linux-ppc64le
          - goos: linux
            goarch: riscv64
            name: controli-linux-riscv64
          - goos: linux
            goarch: s390x
            name: controli-linux-s390x
          - goos: windows
            goarch: "386"
            name: controli-windows-386.exe
          - goos: windows
            goarch: amd64
            name: controli-windows-amd64.exe
          - goos: windows
            goarch: arm
            name: controli-windows-arm.exe
          - goos: windows
            goarch: arm64
            name: controli-windows-arm64.exe
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test ./...
      - run: CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} go build -trimpath -ldflags="-s -w" -o dist/${{ matrix.name }} ./cmd/controli
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - run: gh release create "${GITHUB_REF_NAME}" dist/* --title "Controli ${GITHUB_REF_NAME}" --notes "Expanded cross-platform release build."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
