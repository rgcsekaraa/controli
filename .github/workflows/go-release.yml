name: go-release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    runs-on: ${{ matrix.goos == 'windows' && 'windows-2022' || 'ubuntu-latest' }}
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            name: controli-darwin-arm64
          - goos: darwin
            goarch: amd64
            name: controli-darwin-amd64
          - goos: linux
            goarch: "386"
            name: controli-linux-386
          - goos: linux
            goarch: amd64
            name: controli-linux-amd64
          - goos: linux
            goarch: arm
            goarm: "6"
            name: controli-linux-armv6
          - goos: linux
            goarch: arm
            goarm: "7"
            name: controli-linux-armv7
          - goos: linux
            goarch: arm64
            name: controli-linux-arm64
          - goos: linux
            goarch: ppc64le
            name: controli-linux-ppc64le
          - goos: linux
            goarch: riscv64
            name: controli-linux-riscv64
          - goos: linux
            goarch: s390x
            name: controli-linux-s390x
          - goos: windows
            goarch: "386"
            name: controli-windows-386.exe
          - goos: windows
            goarch: amd64
            name: controli-windows-amd64.exe
          - goos: windows
            goarch: arm
            name: controli-windows-arm.exe
          - goos: windows
            goarch: arm64
            name: controli-windows-arm64.exe
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - run: go test ./...
      - name: Build
        shell: bash
        run: CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} go build -trimpath -ldflags="-s -w" -o dist/${{ matrix.name }} ./cmd/controli
      - name: Validate Windows signing configuration
        if: startsWith(github.ref, 'refs/tags/') && matrix.goos == 'windows'
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ vars.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT: ${{ vars.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          AZURE_TRUSTED_SIGNING_CERT_PROFILE: ${{ vars.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}
        run: |
          missing=0
          for name in \
            AZURE_CLIENT_ID \
            AZURE_TENANT_ID \
            AZURE_SUBSCRIPTION_ID \
            AZURE_TRUSTED_SIGNING_ENDPOINT \
            AZURE_TRUSTED_SIGNING_ACCOUNT \
            AZURE_TRUSTED_SIGNING_CERT_PROFILE
          do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for signed Windows releases"
              missing=1
            fi
          done
          exit "$missing"
      - name: Azure login for Windows signing
        if: startsWith(github.ref, 'refs/tags/') && matrix.goos == 'windows'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Sign Windows binary
        if: startsWith(github.ref, 'refs/tags/') && matrix.goos == 'windows'
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ vars.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          signing-account-name: ${{ vars.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ vars.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}
          files: ${{ github.workspace }}\dist\${{ matrix.name }}
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Controli
          description-url: https://github.com/rgcsekaraa/controli
      - name: Verify Windows signature
        if: startsWith(github.ref, 'refs/tags/') && matrix.goos == 'windows'
        shell: pwsh
        run: |
          $signature = Get-AuthenticodeSignature -FilePath "dist/${{ matrix.name }}"
          $signature | Format-List
          if ($signature.Status -ne "Valid") {
            throw "Invalid Authenticode signature status: $($signature.Status)"
          }
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Generate SHA256 checksums
        run: (cd dist && sha256sum * > SHA256SUMS.txt)
      - run: gh release create "${GITHUB_REF_NAME}" dist/* --title "Controli ${GITHUB_REF_NAME}" --notes "Expanded cross-platform release build."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
